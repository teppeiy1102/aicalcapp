name: aicalcapp
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.6+6

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  flutter_dotenv: ^5.1.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  gal: ^2.3.0
  flutter_launcher_icons:
  purchases_flutter: ^10.1.0
  intl: ^0.20.2
  home_widget: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - .env
    - assets/fonts/

  fonts:
    - family: NotoSansJP
      fonts:
        - asset: assets/fonts/NotoSansJP-Regular.ttf
        - asset: assets/fonts/NotoSansJP-Light.ttf
          weight: 300
        - asset: assets/fonts/NotoSansJP-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansJP-Bold.ttf
          weight: 700
    - family: ZenOldMincho
      fonts:
        - asset: assets/fonts/ZenOldMincho-Regular.ttf
        - asset: assets/fonts/ZenOldMincho-Medium.ttf
          weight: 500
        - asset: assets/fonts/ZenOldMincho-Bold.ttf
          weight: 700


flutter_icons: 
  image_path_android: assets/icon.png
  adaptive_icon_background: assets/icon.png #iconの背景色
  adaptive_icon_foreground: assets/icon.png
  image_path_ios: assets/icon.png
  android: true
  adaptive_icon_padding: true
  min_sdk_android: 30 #Androidの最小SDKバージョン
  ios: true   